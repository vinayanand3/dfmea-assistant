name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAG_FORCE_FALLBACK_EMBEDDER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt
      - name: Run tests
        run: python -m pytest tests -q
      - name: Run reproducible fallback benchmark
        run: python -m evaluation.run_benchmark --mode fallback --output-dir /tmp/rag-evaluation
