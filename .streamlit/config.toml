[theme]
primaryColor = "#E8A33D"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F2F6F4"
textColor = "#1C2B27"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Avoid noisy introspection of optional Transformers image modules in hosted
# deployments. Developers can override this with --server.fileWatcherType auto.
fileWatcherType = "none"
